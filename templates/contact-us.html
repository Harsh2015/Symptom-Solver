<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic setup for the page -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Ensure compatibility with Internet Explorer -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Contact Us</title>

    <!-- Link to custom CSS file for styling -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/contact-us.css') }}">

    <!-- Favicon for the browser tab -->
    <link rel="icon" href="{{ url_for('static', filename='images/favicon-16x16.png') }}" type="image/png">
</head>

<body>

    <!-- Contact Us Section -->
    <section class="contact-us">
        <div class="container">
            <div class="text-center">
                <img src="{{ url_for('static', filename='images/healthcare.png') }}" alt="Logo" class="navbar-logo"
                    style="max-width: 70px; height: auto;">
            </div>

            <h2 class="text-center mb-4">Contact Us</h2>

            <!-- Form container with centered alignment -->
            <div class="row justify-content-center">
                <div class="col-lg-8">

                    <!-- Contact form for users to send a message -->
                    <form action="#" method="POST" class="contact-form">

                        <!-- Input field for the user's full name -->
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" class="form-control"
                                placeholder="Enter your full name" required>
                        </div>

                        <!-- Input field for the user's email address -->
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" class="form-control"
                                placeholder="Enter your email" required>
                        </div>

                        <!-- Input field for the subject of the message -->
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" name="subject" class="form-control"
                                placeholder="Subject of your message" required>
                        </div>

                        <!-- Textarea for the user's message -->
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" class="form-control" rows="5"
                                placeholder="Write your message here..." required></textarea>
                        </div>

                        <!-- Submit button to send the form -->
                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

</body>

</html>
